sonar.projectKey=org.example.fuel-calculator
sonar.projectName=fuel-calculator
sonar.organization=taif-jalo


# Sources & tests
sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.java.binaries=target/classes
sonar.java.test.binaries=target/test-classes
sonar.host.url=http://localhost:9000
sonar.token=$env:SONAR_TOKEN

# JaCoCo coverage report (generated by mvn verify)
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# Encoding
sonar.sourceEncoding=UTF-8

# Java version
sonar.java.source=21

# mvn clean verify sonar:sonar "-Dsonar.projectKey=fuel-calculator" "-Dsonar.token=" "-Dsonar.host.url=http://localhost:9000"


